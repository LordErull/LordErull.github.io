<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>For You ✨</title>

<style>
html, body {
  height:100%;
}

body {
  margin:0;
  font-family:sans-serif;
  color:white;
  text-align:center;
  background:url('Background.jpg') no-repeat center/cover;
  overflow:hidden;

  animation: zoomIn 1.5s ease;
}

/* ZOOM */
@keyframes zoomIn {
  from {
    transform: scale(1.2);
    opacity: 0;
    filter: blur(10px);
  }
  to {
    transform: scale(1);
    opacity: 1;
    filter: blur(0);
  }
}

/* TRANSISI */
.fade {
  animation: fadeSmooth 1s ease;
}

@keyframes fadeSmooth {
  from { opacity:0; transform: translateY(20px);}
  to { opacity:1; transform: translateY(0);}
}

/* CENTER */
.center {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

.hidden { display:none; }

input {
  padding:10px;
  border-radius:10px;
  border:none;
}

/* PROFILE */
.profile-wrapper {
  position: relative;
  width: 120px;
  height: 120px;
  margin: auto;
  margin-top: 80px;
}

.profile {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: url('Profil.png') center/cover;
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 2;
}

/* RING DIAM */
.ring {
  position: absolute;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border-top: 3px solid #00f7ff;
  border-right: 3px solid transparent;
  border-bottom: 3px solid transparent;
  border-left: 3px solid transparent;

  box-shadow:
    0 0 10px #00f7ff,
    0 0 20px #00f7ff,
    0 0 40px #00f7ff;
}

/* NAMA */
.nama {
  margin-top:10px;
  font-size:20px;
}

/* CHATBOX AUTO SIZE */
.chatbox {
  position: relative;
  margin:20px auto;

  display: inline-block;
  max-width: 80%;

  padding:20px 25px;
  border-radius:25px;

  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);

  border:1px solid rgba(255,255,255,0.4);
  box-shadow:0 0 20px rgba(255,255,255,0.2);

  transition: all 0.3s ease;
}

/* TEXT */
#text {
  font-size:22px;
  font-weight:bold;
  text-align:center;
  line-height:1.4;
}

/* ANIMASI TEXT */
.text-anim {
  animation: popIn 0.4s ease;
}

@keyframes popIn {
  from {
    transform: scale(0.95);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

/* BUTTON */
.btn {
  position:absolute;
  bottom:10px;
  right:15px;

  background:white;
  color:black;

  border:none;
  padding:6px 12px;
  border-radius:10px;

  font-size:14px;
}
</style>

</head>
<body>

<audio id="musik" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3" type="audio/mpeg">
</audio>

<!-- INPUT -->
<div class="center" id="start">
  <h2>Masukkan Namamu</h2>
  <input type="text" id="nama">
  <br><br>
  <button onclick="mulai()">OK</button>
</div>

<!-- MAIN -->
<div id="main" class="hidden">

  <div class="profile-wrapper">
    <div class="ring"></div>
    <div class="profile"></div>
  </div>

  <div class="nama" id="namaTampil"></div>

  <div class="chatbox">
    <p id="text"></p>
    <button class="btn" onclick="next()">Klik untuk Lanjut</button>
  </div>
</div>

<!-- AKHIR -->
<div class="center hidden" id="akhir">
  <h2>Tulis Pesan 🎁</h2>
  <input type="text" id="pesan">
  <br><br>
  <button onclick="kirimWA()">Kirim ke WhatsApp</button>
</div>

<script>
let namaUser = "";
let step = 0;

let texts = [
  "Aku ada sesuatu nih 😏",
  "Serius ini penting...",
  "Siap ya...",
  "Selamat ulang tahun 🎉💖"
];

function mulai(){
  namaUser = document.getElementById("nama").value;

  let start = document.getElementById("start");
  start.classList.add("fade");

  setTimeout(()=>{
    start.classList.add("hidden");

    let main = document.getElementById("main");
    main.classList.remove("hidden");
    main.classList.add("fade");

    document.getElementById("namaTampil").innerHTML = namaUser;

    document.getElementById("musik").play().catch(()=>{});

    ketik();
  }, 500);
}

function ketik(){
  let text = texts[step];
  let i = 0;

  let textEl = document.getElementById("text");
  textEl.innerHTML="";
  textEl.classList.remove("text-anim");

  let interval = setInterval(()=>{
    textEl.innerHTML += text[i];
    i++;

    if(i>=text.length){
      clearInterval(interval);
      textEl.classList.add("text-anim");
    }
  },40);
}

function next(){
  step++;
  if(step < texts.length){
    ketik();
  } else {
    let main = document.getElementById("main");
    main.classList.add("fade");

    setTimeout(()=>{
      main.classList.add("hidden");

      let akhir = document.getElementById("akhir");
      akhir.classList.remove("hidden");
      akhir.classList.add("fade");
    }, 500);
  }
}

function kirimWA(){
  let pesan = document.getElementById("pesan").value;
  let nomor = "6281234567890";
  let url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);
  window.open(url);
}
</script>

</body>
</html>
