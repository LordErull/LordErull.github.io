<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tantangan</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

/* Background */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover;
  filter: blur(8px);
  transform: scale(1.1);
  z-index: -2;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}

/* Container */
.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: rgba(255,255,255,0.9);
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 350px;
  text-align: center;
  animation: fade 0.5s;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-top: 10px;
}

button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.yes { background: #4CAF50; color: white; }
.no { background: #f44336; color: white; }

@keyframes fade {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">
  <div class="card" id="content"></div>
</div>

<script>
let nama = "";

// STEP 1
function step1() {
  document.getElementById("content").innerHTML = `
    <h2>Klik untuk mulai</h2>
    <button onclick="step2()">Klik ini</button>
  `;
}

// STEP 2
function step2() {
  document.getElementById("content").innerHTML = `
    <h2>Masukkan nama</h2>
    <input type="text" id="namaInput" placeholder="Nama kamu">
    <button onclick="step3()">Lanjut</button>
  `;
}

// STEP 3
function step3() {
  nama = document.getElementById("namaInput").value;
  if(nama === "") return alert("Isi nama dulu!");

  document.getElementById("content").innerHTML = `
    <p>Hai, ${nama} ada pesan nih dari Anam</p>
    <p><b>Ada Tantangan nih dari Anam</b></p>
    <button onclick="step4()">Apa tantangannya?</button>
  `;
}

// STEP 4
function step4() {
  document.getElementById("content").innerHTML = `
    <p>Tantangannya itu...........</p>
    <button onclick="step5()">Oke</button>
  `;
}

// STEP 5
function step5() {
  document.getElementById("content").innerHTML = `
    <p>Apakah kamu menerima tantangan itu?</p>
    <button class="yes" onclick="kirim('Ya')">Ya</button>
    <button class="no" onclick="kirim('Tidak')">Tidak</button>
  `;
}

// STEP 6 (kirim WA + thank you)
function kirim(jawaban) {
  let nomor = "62123456789"; // GANTI NOMOR KAMU
  let pesan = "jawaban : " + jawaban;

  let url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);
  window.open(url, "_blank");

  document.getElementById("content").innerHTML = `
    <h2>Terima kasih 🙏</h2>
    <p>Jawaban kamu sudah dikirim</p>
  `;
}

// start
step1();
</script>

</body>
</html>
