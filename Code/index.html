<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ✨</title><style>
body {
  margin:0;
  font-family:sans-serif;
  color:white;
  text-align:center;
  overflow:hidden;

  background: url('Background.jpg') no-repeat center center;
  background-size: cover;
}

body::before {
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.5);
}

.wrapper {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  opacity:0;
  transform:scale(0.95);
  transition:all 0.5s ease;
}

.wrapper.show {
  opacity:1;
  transform:scale(1);
}

.hidden { display:none; }

.box {
  width:85%;
  max-width:300px;
}

.inputBox {
  background:rgba(0,0,0,0.4);
  padding:15px;
  border-radius:15px;
}

input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  font-size:16px;
  margin-bottom:10px;
}

button {
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#00f7ff;
  color:black;
  font-size:16px;
}

.profile {
  width:90px;
  height:90px;
  border-radius:50%;
  margin:auto;
  background:url('Profil.png') center/cover;
  box-shadow:0 0 20px #00f7ff;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0px); }
}

.chatbox {
  background:rgba(0,0,0,0.4);
  padding:15px;
  border-radius:15px;
  margin-top:10px;
}

#text { font-size:20px; }

.pilihan button {
  width:auto;
  padding:10px 20px;
  margin:10px;
}

.tidak { position:relative; }
</style></head><body><!-- MUSIK AUTO --><audio id="musik" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

<!-- START --><div class="wrapper show" id="start">
  <div class="box inputBox">
    <input id="nama" placeholder="Masukkan nama">
    <button onclick="mulai()">Oke</button>
  </div>
</div><!-- MAIN --><div class="wrapper hidden" id="main">
  <div class="box">
    <div class="profile"></div>
    <h3 id="namaTampil"></h3>
    <div class="chatbox">
      <p id="text"></p>
      <div id="btnArea"></div>
    </div>
  </div>
</div><!-- TANYA --><div class="wrapper hidden" id="tanya">
  <div class="box">
    <h2>Kamu seneng ga hari ini? 😏</h2>
    <div class="pilihan">
      <button onclick="jawabYa()">Ya 😊</button>
      <button class="tidak" onclick="hindar(this)">Tidak 😈</button>
    </div>
    <p id="jahil"></p>
  </div>
</div><!-- AKHIR --><div class="wrapper hidden" id="akhir">
  <div class="box inputBox">
    <input id="pesan" placeholder="Tulis pesan...">
    <button onclick="kirimWA()">Kirim</button>
  </div>
</div><script>
let step=0;
let namaUser="";

let texts=[
  "Aku ada sesuatu nih 😏",
  "Serius ini penting...",
  "Siap ya...",
  "Selamat ulang tahun 🎉"
];

let texts2=[
  "Semoga panjang umur",
  "Semoga bahagia selalu",
  "Semoga semua tercapai"
];

function showPage(hideEl, showEl){
  hideEl.classList.remove("show");
  setTimeout(()=>{
    hideEl.classList.add("hidden");
    showEl.classList.remove("hidden");
    setTimeout(()=>showEl.classList.add("show"),50);
  },300);
}

function mulai(){
  let nama=document.getElementById("nama").value;
  if(!nama) return alert("Isi nama dulu");

  namaUser=nama;

  document.getElementById("musik").play();

  showPage(start, main);

  namaTampil.innerHTML="Hai, "+namaUser+" ✨";
  setTimeout(ketik,500);
}

function ketik(){
  let t=texts[step];
  let i=0;
  text.innerHTML="";
  btnArea.innerHTML="";

  let int=setInterval(()=>{
    text.innerHTML+=t[i];
    i++;
    if(i>=t.length){
      clearInterval(int);
      if(step<texts.length-1){
        setTimeout(()=>{step++;ketik();},1000);
      }else showBtn();
    }
  },40);
}

function showBtn(){
  let b=document.createElement("button");
  b.innerText="Klik untuk lanjut ➜";
  b.onclick=()=>{
    showPage(main, tanya);
  };
  btnArea.appendChild(b);
}

function hindar(btn){
  btn.style.position="absolute";
  btn.style.left=Math.random()*80+"%";
  btn.style.top=Math.random()*80+"%";
  jahil.innerHTML="Eits ga bisa 😝";
}

function jawabYa(){
  step=0;
  showPage(tanya, main);
  setTimeout(lanjut2,500);
}

function lanjut2(){
  let t=texts2[step];
  let i=0;
  text.innerHTML="";
  btnArea.innerHTML="";

  let int=setInterval(()=>{
    text.innerHTML+=t[i];
    i++;
    if(i>=t.length){
      clearInterval(int);
      if(step<texts2.length-1){
        setTimeout(()=>{step++;lanjut2();},1000);
      }else{
        setTimeout(()=>{
          showPage(main, akhir);
        },1000);
      }
    }
  },40);
}

function kirimWA(){
  let p=pesan.value;
  if(!p) return alert("Isi pesan dulu");
  window.open("https://wa.me/6281234567890?text="+encodeURIComponent(p));
}
</script></body>
</html>
