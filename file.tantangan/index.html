<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:black;
  overflow:hidden;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:center/cover no-repeat;
  z-index:-2;
  transition:1s;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
}

/* CENTER */
.wrap{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:25px;
}

/* PAGE */
.page{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.95);
  width:100%;
  max-width:340px;
  opacity:0;
  transition:0.5s ease;
}
.page.active{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

/* CARD */
.card{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  color:white;
  text-align:center;
}

/* BOX */
.box{
  margin-top:15px;
  padding:15px;
  border-radius:15px;
  background:rgba(255,255,255,0.15);
  text-align:left;
  min-height:60px;
  line-height:1.6;
  word-wrap:break-word;
  transition:all 0.4s ease;
}

/* INPUT & BUTTON */
input, button{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-top:12px;
  font-size:14px;
  box-sizing:border-box;
}

input{
  background:rgba(255,255,255,0.2);
  color:white;
  outline:none;
}
input::placeholder{
  color:rgba(255,255,255,0.6);
}

button{
  font-weight:bold;
  cursor:pointer;
}
.green{background:#00c853;color:white}
.red{background:#ff1744;color:white}

/* PROFILE BLUE PULSE */
.profile-wrap{
  position:relative;
  width:110px;
  height:110px;
  margin:auto;
  display:flex;
  justify-content:center;
  align-items:center;
}

.profile-ring{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  border:3px solid rgba(0,150,255,0.8);
  box-shadow:0 0 15px rgba(0,150,255,0.6);
}

.profile-wrap::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  border:3px solid rgba(0,150,255,0.6);
  animation:pulseBlue 2s infinite;
}

.profile-img{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid white;
  z-index:2;
}

@keyframes pulseBlue{
  0%{transform:scale(1);opacity:.7}
  50%{transform:scale(1.2);opacity:.2}
  100%{transform:scale(1);opacity:.7}
}

/* TEXT */
.word{
  opacity:0;
  animation:fadeIn .2s forwards;
}
@keyframes fadeIn{to{opacity:1}}

/* CURSOR */
.cursor{
  display:inline-block;
  width:2px;
  background:white;
  margin-left:2px;
  animation:blink 1s infinite;
}
@keyframes blink{
  0%,50%,100%{opacity:1}
  25%,75%{opacity:0}
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<div class="wrap">
  <div id="app"></div>
</div>

<script>

/* CONFIG */
let BG_HA = "Background_Blue.png";
let BG_HB = "Background_Red.png";
let PROFILE_LINK = "Profil.jpg";
let nomor = "6285786143603";

/* DATA */
let nama="";
let hold=false;
let sudahKirim=false;
let stepHA=1;

/* PAGE */
function set(html){
  const app=document.getElementById("app");
  const old=app.querySelector(".page");

  const page=document.createElement("div");
  page.className="page";
  page.innerHTML=`<div class="card">${html}</div>`;
  app.appendChild(page);

  setTimeout(()=>{
    page.classList.add("active");
    if(old){
      old.classList.remove("active");
      setTimeout(()=>old.remove(),400);
    }
  },10);
}

/* TYPING */
function typing(el,text){
  function resize(){
    let box=el.closest(".box");
    if(box){
      box.style.height="auto";
      box.style.height=box.scrollHeight+"px";
    }
  }

  el.innerHTML="";
  let cursor=document.createElement("span");
  cursor.className="cursor";
  el.appendChild(cursor);

  let i=0;
  function next(){
    if(i<text.length){
      if(!hold){
        cursor.remove();
        let span=document.createElement("span");
        span.className="word";
        span.innerText=text[i];
        el.appendChild(span);
        el.appendChild(cursor);
        resize();

        let delay=25+Math.random()*40;
        if(text[i]===".") delay=300;
        if(text[i]===",") delay=150;

        i++;
        setTimeout(next,delay);
      }else{
        setTimeout(next,50);
      }
    }
  }
  next();
}

document.body.onmousedown=()=>hold=true;
document.body.onmouseup=()=>hold=false;

/* PROFILE */
function profile(){
return `
<div class="profile-wrap">
  <div class="profile-ring"></div>
  <img src="${PROFILE_LINK}" class="profile-img">
</div>`;
}

/* FLOW */

function HA3(){

${profile()}
<p>Hai lagi, ${nama} ✨</p>
<p>Masih ada pesan dari Anam</p>
<div class="box" id="t4"></div>

/* KONFIRMASI */
function HA_CONFIRM(){

typing(document.getElementById("tConfirm"),"Tekan konfirmasi untuk mengirim jawaban kamu...");

/* KIRIM TERIMA */
function kirimTerima(){
stepHA=99;
sudahKirim=true;

let text="Jawaban : Tantangan Diterima";

/* TIDAK */
function HB1(){
document.getElementById("bg").style.background=`url(${BG_HB})`;
set(`
<div class="box">Ketik alasan kamu</div>

`);
}

function kirim(){
let alasan=document.getElementById("alasan").value.trim();

if(!alasan){
  alert("Alasan harus diisi dulu!");
  return;
}

let label = stepHA===1 ? "HA1" : "HA2";

sudahKirim=true;
window.open("https://wa.me/"+nomor+"?text="+encodeURIComponent(text),"_blank");
}

/* DETEKSI BALIK */
document.addEventListener("visibilitychange",function(){
if(document.visibilityState==="visible" && sudahKirim){
  sudahKirim=false;

  if(stepHA===99){
    THANKS();
  }else{
    HB2();
  }

});

function HB2(){
set(`
<div class="box" id="t5"></div>
<small>tahan untuk pause</small>

<button class="green" onclick="SELESAI()">Selanjutnya</button>
`);
typing(document.getElementById("t5"),"Terima kasih sudah jujur...");
  }

function THANKS(){

}

/* START */
OP1();

</script>
</body>
</html>
