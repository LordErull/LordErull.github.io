<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>For You ✨</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  color:white;
  text-align:center;

  /* 🔥 GANTI BACKGROUND DI SINI */
  background:url('https://i.ibb.co/7QpKsCX/street.jpg') no-repeat center/cover;

  overflow:hidden;
}

/* CENTER */
.center {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

.hidden { display:none; }

/* INPUT */
input {
  padding:10px;
  border-radius:10px;
  border:none;
}

/* PROFILE WRAPPER */
.profile-wrapper {
  position: relative;
  width: 120px;
  height: 120px;
  margin: auto;
  margin-top: 80px;
}

/* FOTO PROFIL */
.profile {
  width: 100px;
  height: 100px;
  border-radius: 50%;

  /* 🔥 GANTI FOTO DI SINI */
  background: url('https://i.ibb.co/2kRZ9qM/panda.png') center/cover;

  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 2;
}

/* RING NEON MUTER */
.ring {
  position: absolute;
  width: 120px;
  height: 120px;
  border-radius: 50%;

  /* 🔥 GANTI WARNA NEON DI SINI */
  border-top: 3px solid #00f7ff;

  border-right: 3px solid transparent;
  border-bottom: 3px solid transparent;
  border-left: 3px solid transparent;

  box-shadow:
    0 0 10px #00f7ff,
    0 0 20px #00f7ff,
    0 0 40px #00f7ff;

  animation: putar 3s linear infinite;
}

@keyframes putar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* NAMA */
.nama {
  margin-top:10px;
  font-size:20px;
}

/* CHAT BOX */
.chatbox {
  margin:20px auto;
  width:280px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
}

/* BUTTON */
.btn {
  margin-top:10px;
  background:transparent;
  color:white;
  border:1px solid white;
  padding:8px;
  border-radius:10px;
}
</style>

</head>
<body>

<!-- 🔊 MUSIK -->
<audio id="musik" loop>
  <!-- 🔥 GANTI LAGU DI SINI -->
  <source src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3" type="audio/mpeg">
</audio>

<!-- INPUT NAMA -->
<div class="center" id="start">
  <h2>Masukkan Namamu</h2>
  <input type="text" id="nama">
  <br><br>
  <button onclick="mulai()">OK</button>
</div>

<!-- HALAMAN UTAMA -->
<div id="main" class="hidden">

  <div class="profile-wrapper">
    <div class="ring"></div>
    <div class="profile"></div>
  </div>

  <div class="nama" id="namaTampil"></div>

  <div class="chatbox">
    <p id="text"></p>
    <button class="btn" onclick="next()">Klik untuk lanjut</button>
  </div>
</div>

<!-- AKHIR -->
<div class="center hidden" id="akhir">
  <h2>Tulis Pesan 🎁</h2>
  <input type="text" id="pesan">
  <br><br>

  <!-- 🔥 GANTI NOMOR WA DI SINI -->
  <button onclick="kirimWA()">Kirim ke WhatsApp</button>
</div>

<script>
let namaUser = "";
let step = 0;

/* 🔥 EDIT TEKS CERITA DI SINI */
let texts = [
  "Hai, {nama} ✨",
  "Aku ada sesuatu nih 🤭❤️",
  "Semoga kamu suka ya 🎁",
  "Selamat ulang tahun 🎉💖"
];

function mulai(){
  namaUser = document.getElementById("nama").value;

  document.getElementById("start").classList.add("hidden");
  document.getElementById("main").classList.remove("hidden");

  document.getElementById("namaTampil").innerHTML = "Hai, " + namaUser + " ✨";

  // 🔊 PLAY MUSIK
  let musik = document.getElementById("musik");
  musik.play().catch(()=>{});

  ketik();
}

function ketik(){
  let text = texts[step].replace("{nama}", namaUser);
  let i = 0;
  document.getElementById("text").innerHTML="";

  let interval = setInterval(()=>{
    document.getElementById("text").innerHTML += text[i];
    i++;
    if(i>=text.length) clearInterval(interval);
  },40);
}

function next(){
  step++;
  if(step < texts.length){
    ketik();
  } else {
    document.getElementById("main").classList.add("hidden");
    document.getElementById("akhir").classList.remove("hidden");
  }
}

/* 📲 WHATSAPP */
function kirimWA(){
  let pesan = document.getElementById("pesan").value;

  // 🔥 GANTI NOMOR DI SINI (contoh: 628xxxx)
  let nomor = "6281234567890";

  let url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);
  window.open(url);
}
</script>

</body>
</html>
